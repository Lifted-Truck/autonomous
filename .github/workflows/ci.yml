name: ci

# CI here = run the project oracle in the cloud on every push/PR. It mirrors
# the local Stop-hook gate (doctrine: "CI mirrors the Stop hook"). Green here
# means the same thing as green locally: ./verify fast passed.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: ./verify fast
        run: |
          chmod +x verify
          ./verify fast
